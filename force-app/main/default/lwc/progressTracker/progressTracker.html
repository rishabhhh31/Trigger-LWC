<template>
    <lightning-card title="Project Progress Tracker" icon-name="standard:opportunity">
        <div class="slds-m-around_medium">
            <template if:true={wiredProjects.data}>
                <template for:each={projects} for:item="project">
                    <div key={project.Id} class="slds-box slds-m-bottom_small">
                        <div class="slds-grid slds-grid_align-spread">
                            <h3 class="slds-text-heading_small">{project.Name}</h3>
                            <span>{project.Progress__c}%</span>
                        </div>
                        <div
                            class="slds-progress-bar slds-progress-bar_circular slds-progress-bar_large slds-m-top_x-small"
                            aria-valuemin="0"
                            aria-valuemax="100"
                            aria-valuenow={project.Progress__c}
                            role="progressbar">

                            <span class="slds-progress-bar__value" style={project.progressStyle}>
                                <span class="slds-assistive-text">
                                    Progress: {project.Progress__c}%
                                </span>
                            </span>

                        </div>

                        <div class="slds-grid slds-grid_align-spread slds-m-top_x-small">
                            <span>Start Date: {project.startDate}</span>
                            <span>End Date: {project.endDate}</span>
                        </div>

                        <div class="slds-text-align_right slds-m-top_small">
                            <lightning-button
                                label="Update Progress"
                                data-project-id={project.Id}
                                onclick={updateProgress}>
                            </lightning-button>
                        </div>

                    </div>

                </template>
            </template>

            <template if:true={wiredProjects.error}>
                <p>Error loading projects: {wiredProjects.error.message}</p>
            </template>

        </div>

        <!-- Modal -->
        <template if:true={showUpdateModal}>

            <section
                role="dialog"
                tabindex="-1"
                aria-labelledby="modal-heading-02"
                aria-modal="true"
                aria-describedby="modal-content-id-2"
                class="slds-modal slds-fade-in-open">

                <div class="slds-modal__container">

                    <header class="slds-modal__header">

                        <button
                            class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close"
                            onclick={closeModal}>

                            <lightning-icon
                                icon-name="utility:close"
                                size="medium"
                                variant="inverse">
                            </lightning-icon>

                            <span class="slds-assistive-text">Close</span>

                        </button>

                        <h2
                            id="modal-heading-02"
                            class="slds-text-heading_medium slds-hyphenate">
                            Update Progress
                        </h2>

                    </header>

                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-2">

                        <lightning-input
                            label="Progress Percentage (0-100)"
                            type="number"
                            value={updateValue}
                            onchange={handleUpdateChange}
                            min="0"
                            max="100">
                        </lightning-input>

                    </div>

                    <footer class="slds-modal__footer">

                        <lightning-button
                            label="Cancel"
                            onclick={closeModal}>
                        </lightning-button>

                        <lightning-button
                            label="Save"
                            variant="brand"
                            onclick={saveProgress}>
                        </lightning-button>

                    </footer>

                </div>

            </section>

            <div class="slds-backdrop slds-backdrop_open"></div>

        </template>

    </lightning-card>
</template>
