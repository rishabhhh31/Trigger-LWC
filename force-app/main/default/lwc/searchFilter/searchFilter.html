<template>
    <lightning-card title="Search and Filter Cases" icon-name="standard:case">
        <div class="slds-m-around_medium">

            <div class="slds-grid slds-wrap slds-gutters">

                <!-- Search -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        type="search"
                        label="Search by Case Number"
                        value={searchTerm}
                        onchange={handleSearch}>
                    </lightning-input>
                </div>

                <!-- Status -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-combobox
                        label="Status"
                        value={statusFilter}
                        options={statuses}
                        onchange={handleStatusFilter}>
                    </lightning-combobox>
                </div>

                <!-- Priority -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-combobox
                        label="Priority"
                        value={priorityFilter}
                        options={priorities}
                        onchange={handlePriorityFilter}>
                    </lightning-combobox>
                </div>

                <!-- Date -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                    <lightning-input
                        type="date"
                        label="Created On or After"
                        value={startDateFilter}
                        onchange={handleDateFilter}>
                    </lightning-input>
                </div>

            </div>

            <div class="slds-m-top_medium">
                <h3 class="slds-text-heading_small">
                    Found {filteredRecords.length} records
                </h3>

                <ul class="slds-has-dividers_around-space">

                    <template for:each={filteredRecords} for:item="record">
                        <li key={record.Id} class="slds-item slds-p-around_small">
                            <strong>{record.CaseNumber}</strong> — {record.Status}

                            <p>
                                Priority: {record.Priority} |
                                Created: {record.CreatedDate}
                            </p>
                        </li>
                    </template>

                    <template if:false={filteredRecords.length}>
                        <li class="slds-item slds-p-around_small">
                            No records found
                        </li>
                    </template>

                </ul>
            </div>

        </div>
    </lightning-card>
</template>
