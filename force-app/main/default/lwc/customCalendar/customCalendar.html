<template>
    <lightning-card title="Custom Calendar" icon-name="standard:event">

        <div class="slds-m-around_medium">

            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small calendar-header">

                <lightning-button-icon
                    icon-name="utility:chevronleft"
                    alternative-text="Previous Month"
                    onclick={previousMonth}>
                </lightning-button-icon>

                <h2 class="slds-text-heading_medium">
                    {currentMonthYear}
                </h2>

                <lightning-button-icon
                    icon-name="utility:chevronright"
                    alternative-text="Next Month"
                    onclick={nextMonth}>
                </lightning-button-icon>

            </div>

            <div class="calendar-grid">

                <template for:each={weekdays} for:item="day">
                    <div key={day} class="weekday-header">
                        {day}
                    </div>
                </template>

                <template for:each={calendarDays} for:item="day">

                    <div
                        key={day.date}
                        class={day.cssClass}
                        data-date={day.date}
                        onclick={selectDate}>

                        <span class="day-number">
                            {day.dayNumber}
                        </span>

                        <template if:true={day.hasEvents}>
                            <span class="event-indicator"></span>
                        </template>

                    </div>

                </template>

            </div>

        </div>

        <!-- Modal -->

        <template if:true={showModal}>

            <section
                role="dialog"
                tabindex="-1"
                class="slds-modal slds-fade-in-open">

                <div class="slds-modal__container">

                    <header class="slds-modal__header">

                        <button
                            class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            onclick={closeModal}>

                            <lightning-icon
                                icon-name="utility:close"
                                size="medium"
                                variant="base">
                            </lightning-icon>

                        </button>

                        <h2 class="slds-text-heading_medium">
                            Add Appointment
                        </h2>

                    </header>

                    <div class="slds-modal__content slds-p-around_medium">

                        <lightning-input
                            label="Subject"
                            data-field="Subject__c"
                            value={newAppointment.Subject__c}
                            onchange={handleInputChange}
                            required>
                        </lightning-input>

                        <lightning-input
                            label="Start Time"
                            type="datetime"
                            data-field="Start_Time__c"
                            value={newAppointment.Start_Time__c}
                            onchange={handleInputChange}>
                        </lightning-input>

                        <lightning-input
                            label="End Time"
                            type="datetime"
                            data-field="End_Time__c"
                            value={newAppointment.End_Time__c}
                            onchange={handleInputChange}>
                        </lightning-input>

                        <lightning-textarea
                            label="Description"
                            data-field="Description__c"
                            value={newAppointment.Description__c}
                            onchange={handleInputChange}>
                        </lightning-textarea>

                    </div>

                    <footer class="slds-modal__footer">

                        <lightning-button
                            label="Cancel"
                            onclick={closeModal}>
                        </lightning-button>

                        <lightning-button
                            label="Save"
                            variant="brand"
                            onclick={saveAppointment}>
                        </lightning-button>

                    </footer>

                </div>

            </section>

            <div class="slds-backdrop slds-backdrop_open"></div>

        </template>

    </lightning-card>
</template>
