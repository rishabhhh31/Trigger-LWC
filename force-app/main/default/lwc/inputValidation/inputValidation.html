<template>
    <lightning-card title="Input Validation" icon-name="standard:validation_rule">
        <div class="slds-m-around_medium">

            <lightning-input
                label="Email Address"
                type="email"
                value={email}
                onchange={validateEmail}
                class="slds-m-bottom_small">
            </lightning-input>

            <template if:true={showError}>
                <div class="slds-text-color_error slds-m-top_small">
                    {errorMessage}
                </div>
            </template>

        </div>
    </lightning-card>
</template>
