        <div class="slds-m-around_medium slds-text-align_center">

            <lightning-button-group>
                <lightning-button 
                    label="Action 1" 
                    onclick={handleAction1}>
                </lightning-button>

                <lightning-button 
                    label="Action 2" 
                    onclick={handleAction2}>
                </lightning-button>

                <lightning-button 
                    label="Action 3"

                </lightning-button>
            </lightning-button-group>

            <p class="slds-m-top_medium">

            </p>

        </div>
    </lightning-card>
