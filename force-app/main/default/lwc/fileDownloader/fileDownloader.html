<template>
    <lightning-card title="My Files" icon-name="standard:file">

        <div class="slds-p-around_medium">

            <!-- File List -->
            <template if:true={documentList}>
                <div class="slds-grid slds-wrap slds-gutters">

                    <template for:each={documentList} for:item="doc">
                        <div key={doc.id} class="slds-col slds-size_1-of-1 slds-box slds-m-bottom_small">

                            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">

                                <!-- File Info -->
                                <div>
                                    <p class="slds-text-heading_small slds-truncate">
                                        {doc.fields.Title.value}.{doc.fields.FileExtension.value}
                                    </p>
                                    <p class="slds-text-body_small slds-text-color_weak">
                                        {doc.fields.ContentSize.value} Bytes
                                    </p>
                                </div>

                                <!-- Actions -->
                                <div class="slds-button-group">
                                    <lightning-button
                                        label="Preview"
                                        variant="neutral"
                                        data-id={doc.id}
                                        onclick={handlePreview}>
                                    </lightning-button>

                                    <lightning-button
                                        label="Download"
                                        variant="brand"
                                        data-id={doc.id}
                                        onclick={handleDownload}>
                                    </lightning-button>
                                </div>

                            </div>

                        </div>
                    </template>

                </div>
            </template>

            <!-- Error -->
            <template if:true={loadError}>
                <div class="slds-text-color_error">
                    Error loading files
                </div>
            </template>

        </div>
    </lightning-card>

    <!-- Download Progress Modal -->
    <template if:true={isDownloadModalOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <!-- Header -->
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">Downloading File</h2>
                </header>

                <!-- Body -->
                <div class="slds-modal__content slds-p-around_medium">

                    <p class="slds-m-bottom_small">
                        {downloadProgressLabel}
                    </p>

                    <lightning-progress-bar
                        value={downloadProgress}
                        size="large">
                    </lightning-progress-bar>

                </div>

                <!-- Footer -->
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        onclick={closeModal}>
                    </lightning-button>
                </footer>

            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
