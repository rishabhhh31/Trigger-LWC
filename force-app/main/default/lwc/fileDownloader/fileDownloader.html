<template>
    <lightning-card title="File Downloader" icon-name="standard:file">
        <div class="slds-m-around_medium">

            <!-- File List -->
            <template if:true={files}>
                <ul class="slds-has-dividers_around-space">
                    <template for:each={files} for:item="file">
                        <li key={file.id} class="slds-item">
                            <div class="slds-grid slds-grid_align-spread">
                                
                                <div>
                                    <strong>{file.fields.Title.value}.{file.fields.FileExtension.value}</strong><br/>
                                    {file.fields.ContentSize.value} Bytes
                                </div>

                                <lightning-button
                                    label="Download"
                                    data-file-id={file.id}
                                    onclick={downloadFile}>
                                </lightning-button>

                                <lightning-button
                                    label="Preview"
                                    data-file-id={file.id}
                                    onclick={previewHandler}>
                                </lightning-button>

                            </div>
                        </li>
                    </template>
                </ul>
            </template>

            <!-- Error -->
            <template if:true={error}>
                <p>Error loading files</p>
            </template>

            <!-- Progress Bar -->
            <template if:true={showProgress}>
                <lightning-progress-bar value={progress} size="large" variant="circular"></lightning-progress-bar>
            </template>

        </div>
    </lightning-card>
</template>
